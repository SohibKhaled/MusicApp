<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="VIBE — A sleek, offline-ready music player">

  <title>VIBE — Music Player</title>

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Manifest for PWA -->
  <link rel="manifest" href="manifest.json">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
  <link rel="apple-touch-icon" href="assets/default-cover.png">
</head>
<body>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- App Shell -->
  <div id="app">

    <!-- ═══════ Header ═══════ -->
    <header class="header">
      <div class="header__brand">
        <div class="header__logo">🎵</div>
        <h1 class="header__title">VIBE</h1>
      </div>
      <div class="header__actions">
        <button class="header__btn" id="btn-shuffle-header" aria-label="Toggle shuffle" title="Shuffle">🔀</button>
        <button class="header__btn" id="btn-view-toggle" aria-label="Toggle view" title="Toggle view">🎵</button>
      </div>
    </header>

    <!-- ═══════ Loading View ═══════ -->
    <div class="view active" id="loading-view">
      <div class="loading">
        <div class="loading__spinner"></div>
        <p class="loading__text">Loading your music…</p>
      </div>
    </div>

    <!-- ═══════ Empty View ═══════ -->
    <div class="view" id="empty-view">
      <div class="empty-state">
        <div class="empty-state__icon">🎶</div>
        <h2 class="empty-state__title">No Music Found</h2>
        <p class="empty-state__text">
          Add your music files to the <strong>music/</strong> folder and update 
          <strong>music/tracks.json</strong> with your track details.
        </p>
      </div>
    </div>

    <!-- ═══════ Playlist View ═══════ -->
    <div class="view" id="playlist-view">
      <div class="playlist-header">
        <h2 class="playlist-header__title">Your Library</h2>
        <p class="playlist-header__count" id="track-count">0 tracks</p>
      </div>
      <ul class="track-list" id="track-list">
        <!-- Tracks rendered by JS -->
      </ul>
    </div>

    <!-- ═══════ Now Playing View ═══════ -->
    <div class="view" id="player-view">
      <div class="now-playing">

        <!-- Cover Art -->
        <div class="cover-container" id="cover-container">
          <img class="cover-art" id="cover-art" src="assets/default-cover.png" alt="Album Cover" loading="lazy">
        </div>

        <div class="now-playing__right">
          <!-- Track Info -->
          <div class="track-info">
            <h2 class="track-info__title" id="track-title">No Track Selected</h2>
            <p class="track-info__artist" id="track-artist">—</p>
          </div>

          <!-- Progress Bar -->
          <div class="progress-container">
            <div class="progress-bar" id="progress-bar">
              <div class="progress-bar__buffered" id="progress-buffered"></div>
              <div class="progress-bar__fill" id="progress-fill"></div>
              <div class="progress-bar__thumb" id="progress-thumb"></div>
            </div>
            <div class="progress-times">
              <span id="time-current">0:00</span>
              <span id="time-duration">--:--</span>
            </div>
          </div>

          <!-- Main Controls -->
          <div class="controls">
            <button class="ctrl-btn ctrl-btn--sm" id="btn-shuffle" aria-label="Shuffle" title="Shuffle">
              <span class="ctrl-icon">🔀</span>
            </button>
            <button class="ctrl-btn ctrl-btn--md" id="btn-prev" aria-label="Previous" title="Previous">
              <span class="ctrl-icon">⏮</span>
            </button>
            <button class="ctrl-btn ctrl-btn--lg" id="btn-play" aria-label="Play/Pause" title="Play">
              <span class="ctrl-icon">▶</span>
            </button>
            <button class="ctrl-btn ctrl-btn--md" id="btn-next" aria-label="Next" title="Next">
              <span class="ctrl-icon">⏭</span>
            </button>
            <button class="ctrl-btn ctrl-btn--sm" id="btn-repeat" aria-label="Repeat" title="Repeat">
              <span class="ctrl-icon">🔁</span>
            </button>
          </div>

          <!-- Volume -->
          <div class="volume-section">
            <span class="volume-section__icon" id="volume-icon">🔊</span>
            <div class="volume-slider" id="volume-slider">
              <div class="volume-slider__fill" id="volume-fill" style="width: 80%"></div>
            </div>
          </div>

        </div>
      </div>
    </div>

  </div>

  <!-- ═══════ Mini Player ═══════ -->
  <div class="mini-player" id="mini-player">
    <div class="mini-player__progress">
      <div class="mini-player__progress-fill" id="mini-progress-fill"></div>
    </div>
    <div class="mini-player__content">
      <img class="mini-player__cover" id="mini-cover" src="assets/default-cover.png" alt="Cover" loading="lazy">
      <div class="mini-player__info" id="mini-info">
        <div class="mini-player__title" id="mini-title">No Track</div>
        <div class="mini-player__artist" id="mini-artist">—</div>
      </div>
      <div class="mini-player__controls">
        <button class="mini-ctrl" id="mini-btn-play" aria-label="Play/Pause">▶</button>
        <button class="mini-ctrl" id="mini-btn-next" aria-label="Next">⏭</button>
      </div>
    </div>
  </div>

  <!-- App Script -->
  <script src="app.js"></script>

</body>
</html>
